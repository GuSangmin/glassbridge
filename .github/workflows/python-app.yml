name: Build Flet APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 가장 안정적인 3.11 사용

      - name: Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          pip install flet

      - name: Build APK
        run: |
          # 파일명이 main.py가 아니라면 아래에서 수정하세요.
          flet build apk --module-name glassbridge_and

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: glass-bridge-apk
          path: build/apk/*.apk
